apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-user1-jenkins
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.20.20
    path: /mnt/nfs_share/jenkins/user1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user1-jenkins-pvc
  namespace: user1-jenkins
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: pv-user1-jenkins
